---
stages:
  #- pre-commit
  - build
  - test-urls
  - publish

include:
  - project: saltstack/pop/cicd/ci-templates
    file: /docswork/url-tester-brok.yml

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID == null

variables:
  CICD_UPSTREAM_PATH: "saltstack/open/docs/salt-project-website"
  GIT_DEPTH: 1

the-hacks:
  stage: build
  image: python:3.11-slim
  script:
    - pip install -r tools/requirements.txt
    - mkdir -p content/the-hacks/
    - python tools/gen-the-hacks.py
    - cp tools/_index.md content/the-hacks/
  artifacts:
    paths:
      - content/the-hacks/

# Check URLs during publish stage in order to verify all URLs
# across The Hacks episodes
url-tester-brok:
  stage: publish

pages:
  stage: publish
  image: "${CI_TEMPLATE_REGISTRY_HOST}/pages/hugo:latest"
  script:
    - hugo
    - 'echo "Gitlab Pages available at: ${CI_PAGES_URL}"'
  artifacts:
    paths:
      - public
