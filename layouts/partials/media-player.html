<div class="post-player post-player-35569">
    <div class="hidden">
        <audio controls="">
            <source src="{{ .Params.podcast_url }}" type="audio/m4a" />
        </audio>
    </div>
    <div class="audio-player">
        <div class="controls">
            <div class="rewind-fifteen">
                <img src="/images/minus15.svg" />
            </div>
            <div class="play-container">
                <div class="toggle-play play">
                    <img src="/images/play.svg" />
                    <img src="/images/pause.svg" />
                </div>
            </div>
            <div class="forward-fifteen">
                <img src="/images/plus15.svg" />
            </div>
            <div class="timeline">
                <div class="progress" style="width: 0%;"></div>
                <div class="time">
                    <div class="current">0:00</div>
                    <!-- <div class="divider">/</div> -->
                    <div class="length">{{ .Params.length }}</div>
                </div>
            </div>
        </div>
    </div>
</div>
